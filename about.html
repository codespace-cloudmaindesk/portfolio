<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navigation-placeholder"></div>

    <main class="main-content">
        <section id="about-section" class="section container">
            <div class="about-grid">

                <div class="about-image-column">
                    <div class="about-profile-image">
                        <img src="assets/images/about_profile.png" alt="Tumiso Dinkoanyane" class="responsive-image">
                    </div>
                    <div id="about-kpi-container"></div>
                </div>

                <div class="about-content-column">
                    <h1 id="about-heading"></h1>

                    <div id="about-biography"></div>

                    <section id="about-skills-section" class="about-skills-section">
                        <h2 class="about-section-heading">Core Skills</h2>

                        <div class="skills-list">
                            <div class="skill-item">
                                <span class="skill-title">Data Engineering &amp; SQL</span>
                                <div class="skill-progress">
                                    <div class="skill-progress-fill" data-level="90"></div>
                                </div>
                            </div>

                            <div class="skill-item">
                                <span class="skill-title">Business Intelligence</span>
                                <div class="skill-progress">
                                    <div class="skill-progress-fill" data-level="85"></div>
                                </div>
                            </div>

                            <div class="skill-item">
                                <span class="skill-title">Python</span>
                                <div class="skill-progress">
                                    <div class="skill-progress-fill" data-level="75"></div>
                                </div>
                            </div>

                            <div class="skill-item">
                                <span class="skill-title">Financial Reporting</span>
                                <div class="skill-progress">
                                    <div class="skill-progress-fill" data-level="78"></div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
