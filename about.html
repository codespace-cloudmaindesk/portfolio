<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Tumiso Dinkoanyane</title>

    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="navbar"></div>
    <main>
        <section class="about container">
            <div class="about-image">
                <img src="assets/images/about_profile.png" alt="Tumiso Dinkoanyane">
            </div>
            <div class="about-info">
                <h1 id="about-title"></h1>
                <div id="about-content"></div>
                 <div id="about-skills">
                    <div class="skills">
                        <div class="skill">
                            <span class="skill-name">Data Engineering &amp; SQL</span>
                            <div class="skill-bar">
                                <div class="skill-fill" data-level="90"></div>
                            </div>
                        </div>
                        <div class="skill">
                            <span class="skill-name">Business Intelligence</span>
                            <div class="skill-bar">
                                <div class="skill-fill" data-level="85"></div>
                            </div>
                        </div>
                        <div class="skill">
                            <span class="skill-name">Python</span>
                            <div class="skill-bar">
                                <div class="skill-fill" data-level="75"></div>
                            </div>
                        </div>
                        <div class="skill">
                            <span class="skill-name">Financial Reporting</span>
                            <div class="skill-bar">
                                <div class="skill-fill" data-level="78"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script type="module" src="js/load_components.js"></script>
</body>
</html>
